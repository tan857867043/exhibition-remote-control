<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>展厅远程控制系统</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a2e;color:#e0e0e0;height:100vh;overflow:hidden}
        #loginPage{display:flex;justify-content:center;align-items:center;height:100vh;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460)}
        .login-box{background:rgba(255,255,255,.05);border-radius:16px;padding:40px;width:360px;border:1px solid rgba(255,255,255,.1)}
        .login-box h1{text-align:center;margin-bottom:30px;color:#e94560;font-size:24px}
        .login-box input{width:100%;padding:12px 16px;margin:8px 0;border:1px solid rgba(255,255,255,.1);border-radius:8px;background:rgba(255,255,255,.05);color:#fff;font-size:14px;outline:none;transition:border .3s}
        .login-box input:focus{border-color:#e94560}
        .login-box button{width:100%;padding:12px;margin-top:16px;border:none;border-radius:8px;background:#e94560;color:#fff;font-size:16px;cursor:pointer;transition:background .3s}
        .login-box button:hover{background:#c73650}
        .login-error{color:#e94560;text-align:center;margin-top:12px;font-size:13px;display:none}
        #mainPage{display:none;height:100vh}
        .sidebar{width:280px;background:rgba(255,255,255,.03);border-right:1px solid rgba(255,255,255,.05);display:flex;flex-direction:column;float:left;height:100vh}
        .sidebar-header{padding:20px;border-bottom:1px solid rgba(255,255,255,.05)}
        .sidebar-header h2{color:#e94560;font-size:18px}
        .sidebar-header span{font-size:12px;color:#888}
        .device-list{flex:1;overflow-y:auto;padding:8px}
        .device-item{padding:12px 16px;border-radius:8px;cursor:pointer;margin:4px 0;display:flex;align-items:center;transition:background .2s}
        .device-item:hover{background:rgba(255,255,255,.05)}
        .device-item.active{background:rgba(233,69,96,.15);border:1px solid rgba(233,69,96,.3)}
        .device-status{width:8px;height:8px;border-radius:50%;margin-right:12px;flex-shrink:0}
        .device-status.online{background:#4ecca3;box-shadow:0 0 8px rgba(78,204,163,.5)}
        .device-status.offline{background:#555}
        .device-info{flex:1;min-width:0}
        .device-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .device-meta{font-size:11px;color:#888;margin-top:2px}
        .sidebar-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,.05);font-size:12px;color:#666;display:flex;justify-content:space-between}
        .sidebar-footer button{background:none;border:1px solid rgba(255,255,255,.1);color:#888;padding:4px 12px;border-radius:4px;cursor:pointer;font-size:12px}
        .sidebar-footer button:hover{color:#e94560;border-color:#e94560}
        .content{margin-left:280px;height:100vh;display:flex;flex-direction:column}
        .content-header{padding:16px 24px;border-bottom:1px solid rgba(255,255,255,.05);display:flex;align-items:center}
        .content-header h3{font-size:16px;font-weight:500}
        .content-body{flex:1;overflow:hidden;position:relative}
        #desktopTab{display:none;flex-direction:column;background:#111;height:100%}
        #desktopTab.active{display:flex}
        .desktop-toolbar{padding:8px 16px;background:rgba(0,0,0,.3);display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(255,255,255,.05)}
        .desktop-toolbar label{display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;color:#888}
        .desktop-toolbar label input{accent-color:#e94560}
        .desktop-toolbar .btn{padding:4px 12px;border:1px solid rgba(255,255,255,.1);background:transparent;color:#888;border-radius:4px;cursor:pointer;font-size:12px}
        .desktop-toolbar .btn:hover{color:#e94560;border-color:#e94560}
        .desktop-toolbar .status{font-size:12px;color:#4ecca3;margin-left:auto}
        .desktop-canvas-wrap{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#000}
        #desktopCanvas{max-width:100%;max-height:100%;object-fit:contain}
        .desktop-fullscreen .sidebar{display:none}
        .desktop-fullscreen .content{margin-left:0}
        .desktop-fullscreen .content-header{display:none}
        .desktop-fullscreen #desktopTab{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:9999}
        .desktop-fullscreen .desktop-toolbar{position:fixed;top:0;right:0;z-index:10000;background:rgba(0,0,0,.5);border:none;border-radius:0 0 0 8px;padding:6px 12px}
    </style>
</head>
<body>
<div id="loginPage">
    <div class="login-box">
        <h1>展厅远程控制</h1>
        <input type="text" id="loginUser" placeholder="用户名" autocomplete="username">
        <input type="password" id="loginPass" placeholder="密码" autocomplete="current-password">
        <button onclick="login()">登 录</button>
        <div class="login-error" id="loginError">用户名或密码错误</div>
    </div>
</div>
<div id="mainPage">
    <div class="sidebar">
        <div class="sidebar-header"><h2>设备列表</h2><span id="deviceCount">0 台在线</span></div>
        <div class="device-list" id="deviceList"></div>
        <div class="sidebar-footer">
            <span id="userDisplay"></span>
            <div style="display:flex;gap:4px">
                <button onclick="downloadAgent()" style="font-size:16px;padding:2px 8px">⬇</button>
                <button onclick="logout()">退出</button>
            </div>
        </div>
    </div>
    <div class="content">
        <div class="content-header"><h3 id="currentDeviceName">选择设备</h3></div>
        <div class="content-body">
            <div id="desktopTab">
                <div class="desktop-toolbar">
                    <label><input type="checkbox" id="inputToggle" checked> 输入</label>
                    <button class="btn" onclick="setQuality(30)" id="qLow">流畅</button>
                    <button class="btn" onclick="setQuality(50)" id="qMid" style="color:#e94560;border-color:#e94560">均衡</button>
                    <button class="btn" onclick="setQuality(75)" id="qHigh">清晰</button>
                    <button class="btn" onclick="toggleFullscreen()">⛶ 全屏</button>
                    <span style="font-size:12px;color:#888">
                        <span id="statFps" style="color:#4ecca3">-- fps</span> |
                        <span id="statPing" style="color:#f0c040">-- ms</span> |
                        <span id="statBw" style="color:#6cf">-- KB/s</span> |
                        <span id="statSize" style="color:#888">-- KB/帧</span>
                    </span>
                    <span class="status" id="desktopStatus">未连接</span>
                </div>
                <div class="desktop-canvas-wrap">
                    <canvas id="desktopCanvas" style="cursor:none;background:#000"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// ============ State ============
let token = localStorage.getItem('token');
let devices = {};
let currentDeviceId = null;
let streamWs = null;
let frameCount = 0, lastFrameTime = 0;
let cursorX = -1, cursorY = -1;
let pressedKeys = {};
let isFullscreen = false;
let desktopWidth = 0, desktopHeight = 0;

// 双缓冲
let offscreenCanvas = null, offscreenCtx = null;
let displayCanvas = null, displayCtx = null;

// 性能统计
let statsBytes = 0, statsTime = Date.now(), lastPingSent = 0, lastPingRtt = 0;

// ============ Auth ============
if (token) showMainPage();

async function login() {
    const u = document.getElementById('loginUser').value, p = document.getElementById('loginPass').value;
    try {
        const r = await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
        if(!r.ok){document.getElementById('loginError').style.display='block';return}
        const d=await r.json();token=d.token;localStorage.setItem('token',d.token);
        document.getElementById('loginError').style.display='none';showMainPage();
    }catch(e){document.getElementById('loginError').style.display='block'}
}

function logout(){localStorage.removeItem('token');token=null;stopDesktopStream();document.getElementById('mainPage').style.display='none';document.getElementById('loginPage').style.display='flex'}

function showMainPage(){document.getElementById('loginPage').style.display='none';document.getElementById('mainPage').style.display='block';document.getElementById('userDisplay').textContent='已登录';fetchDevices()}

// ============ Devices ============
async function fetchDevices(){
    try{const r=await fetch('/api/devices',{headers:{'x-api-token':token}});if(r.status===401)return logout();
    const list=await r.json();devices={};let online=0;
    list.forEach(d=>{devices[d.id]=d;if(d.online)online++});
    document.getElementById('deviceCount').textContent=online+' 台在线';
    renderDeviceList()}catch(e){}
}

function renderDeviceList(){
    const el=document.getElementById('deviceList');
    const items=Object.values(devices).sort((a,b)=>(b.online?1:0)-(a.online?1:0));
    el.innerHTML=items.map(d=>`<div class="device-item${currentDeviceId===d.id?' active':''}" onclick="selectDevice('${d.id}')"><div class="device-status ${d.online?'online':'offline'}"></div><div class="device-info"><div class="device-name">${d.name||'Unknown'}</div><div class="device-meta">${d.os||''} ${d.resolution||''}</div></div></div>`).join('')||'<div style="padding:20px;color:#555">暂无设备</div>'
}

function selectDevice(id){
    currentDeviceId=id;stopDesktopStream();
    document.getElementById('currentDeviceName').textContent=(devices[id]&&devices[id].name)||'选择设备';
    document.getElementById('desktopTab').classList.add('active');
    renderDeviceList();
    if(devices[id]&&devices[id].online)startDesktopStream();
}

setInterval(fetchDevices,5000);

// ============ Desktop Stream ============
function startDesktopStream(){
    if(streamWs||!currentDeviceId)return;
    const p=window.location.protocol==='http:'?'ws://':'wss://';
    const h=window.location.host;
    
    displayCanvas=document.getElementById('desktopCanvas');
    displayCtx=displayCanvas.getContext('2d');
    offscreenCanvas=document.createElement('canvas');
    offscreenCtx=offscreenCanvas.getContext('2d');
    
    streamWs=new WebSocket(p+h+'/api/v1/stream?device_id='+currentDeviceId);
    streamWs.binaryType='arraybuffer';
    
    const pingInterval=setInterval(()=>{
        if(streamWs&&streamWs.readyState===WebSocket.OPEN){
            lastPingSent=Date.now();
            streamWs.send(new Uint8Array([0x06,0,0,0,0,0]));
        }
    },2000);
    
    streamWs.onopen=()=>document.getElementById('desktopStatus').textContent='已连接';
    streamWs.onmessage=(e)=>{
        if(e.data instanceof ArrayBuffer){
            const buf=new Uint8Array(e.data);
            const sz=e.data.byteLength;
            frameCount++;statsBytes+=sz;
            
            if(sz===6&&buf[0]===0x07){
                lastPingRtt=Date.now()-lastPingSent;
                document.getElementById('statPing').textContent=lastPingRtt+' ms';
                document.getElementById('statPing').style.color=lastPingRtt<50?'#4ecca3':lastPingRtt<100?'#f0c040':'#e94560';
            }
            
            processBatchRegions(buf);
            
            const n=Date.now();
            if(n-lastFrameTime>1000){
                const fps=Math.round(frameCount/((n-lastFrameTime)/1000));
                const bw=Math.round(statsBytes/((n-statsTime)/1000)/1024);
                const avgSize=Math.round(statsBytes/frameCount/1024);
                document.getElementById('statFps').textContent=fps+' fps';
                document.getElementById('statFps').style.color=fps<10?'#e94560':fps<20?'#f0c040':'#4ecca3';
                document.getElementById('statBw').textContent=bw+' KB/s';
                document.getElementById('statSize').textContent=avgSize+' KB';
                lastFrameTime=n;statsTime=n;frameCount=0;statsBytes=0;
            }
        }
    };
    
    function processBatchRegions(buf){
        const MIN_HEADER_SIZE=11;
        let offset=0;
        const totalSize=buf.length;
        let hasValidRegion=false;
        
        while(offset+MIN_HEADER_SIZE<=totalSize){
            const frameType=buf[offset];
            const x=(buf[offset+1]<<8)|buf[offset+2];
            const y=(buf[offset+3]<<8)|buf[offset+4];
            const w=(buf[offset+5]<<8)|buf[offset+6];
            const h=(buf[offset+7]<<8)|buf[offset+8];
            const jpegLen=(buf[offset+9]<<8)|buf[offset+10];
            
            const regionSize=MIN_HEADER_SIZE+jpegLen;
            if(offset+regionSize>totalSize){
                break;
            }
            
            if(w===0||h===0||jpegLen===0){
                offset+=regionSize;
                continue;
            }
            
            const jpegData=buf.slice(offset+MIN_HEADER_SIZE,offset+regionSize);
            
            if(frameType===0x02){
                offscreenCanvas.width=w;
                offscreenCanvas.height=h;
                displayCanvas.width=w;
                displayCanvas.height=h;
                desktopWidth=w;
                desktopHeight=h;
                offscreenCtx.fillStyle='#000';
                offscreenCtx.fillRect(0,0,w,h);
                document.getElementById('desktopStatus').textContent=w+'x'+h;
            }
            
            createImageBitmap(new Blob([jpegData])).then(bitmap=>{
                offscreenCtx.drawImage(bitmap,x,y);
                bitmap.close();
                displayCtx.drawImage(offscreenCanvas,0,0);
            }).catch(()=>{});
            
            hasValidRegion=true;
            offset+=regionSize;
        }
    }
    streamWs.onclose=()=>{clearInterval(pingInterval);streamWs=null;document.getElementById('desktopStatus').textContent='已断开';document.getElementById('statFps').textContent='-- fps';document.getElementById('statPing').textContent='-- ms';document.getElementById('statBw').textContent='-- KB/s';document.getElementById('statSize').textContent='-- KB'};
}

function stopDesktopStream(){
    if(streamWs){for(let k in pressedKeys){try{streamWs.send(new Uint8Array([0x04,1,k&0xFF,(k>>8)&0xFF,0,0]).buffer)}catch(e){}}pressedKeys={};streamWs.close();streamWs=null}
    document.getElementById('desktopStatus').textContent='未连接'
}

// ============ Cursor ============
document.addEventListener('mousemove',e=>sendMouseEvent(e));
document.addEventListener('mousedown',e=>sendMouseEvent(e));
document.addEventListener('mouseup',e=>sendMouseEvent(e));
document.addEventListener('wheel',e=>sendMouseEvent(e),{passive:false});
document.addEventListener('keydown',e=>sendKeyboardEvent(e));
document.addEventListener('keyup',e=>sendKeyboardEvent(e));

function sendMouseEvent(e){
    if(!currentDeviceId||!streamWs)return;
    const c=document.getElementById('desktopCanvas'),r=c.getBoundingClientRect();
    if(e.clientX<r.left||e.clientX>r.right||e.clientY<r.top||e.clientY>r.bottom)return;
    const dpr=window.devicePixelRatio||1;
    const x=Math.round((e.clientX-r.left)*(c.width/r.width/dpr));
    const y=Math.round((e.clientY-r.top)*(c.height/r.height/dpr));
    let btn=0;if(e.which===2)btn=1;else if(e.which===3)btn=2;
    let buf;
    if(e.type==='mousemove'){cursorX=x;cursorY=y;buf=new Uint8Array([0x01,btn,x&0xFF,(x>>8)&0xFF,y&0xFF,(y>>8)&0xFF])}
    else if(e.type==='mousedown'){buf=new Uint8Array([0x02,btn,1,0,0,0])}
    else if(e.type==='mouseup'){buf=new Uint8Array([0x02,btn,0,0,0,0])}
    else if(e.type==='wheel'){e.preventDefault();const d=Math.round(e.deltaY);buf=new Uint8Array([0x03,0,d&0xFF,(d>>8)&0xFF,0,0])}
    else return;
    if(streamWs.readyState===WebSocket.OPEN)streamWs.send(buf.buffer)
}

function sendKeyboardEvent(e){
    if(!currentDeviceId||!streamWs)return;
    const vk=e.keyCode||e.which;
    if(e.type==='keydown'){
        if(e.ctrlKey&&e.altKey&&vk===46){e.preventDefault();streamWs.send(new Uint8Array([0x05,10,0,0,0,0]).buffer);return}
        pressedKeys[vk]=true;streamWs.send(new Uint8Array([0x04,0,vk&0xFF,(vk>>8)&0xFF,0,0]).buffer)
    }else if(e.type==='keyup'){delete pressedKeys[vk];streamWs.send(new Uint8Array([0x04,1,vk&0xFF,(vk>>8)&0xFF,0,0]).buffer)}
}

// ============ Fullscreen ============
function toggleFullscreen(){isFullscreen=!isFullscreen;document.body.classList.toggle('desktop-fullscreen',isFullscreen)}

// ============ Quality ============
function setQuality(v){
    ['qLow','qMid','qHigh'].forEach(id=>document.getElementById(id).style.color='');
    if(v===30)document.getElementById('qLow').style.color='#e94560';
    if(v===50)document.getElementById('qMid').style.color='#e94560';
    if(v===75)document.getElementById('qHigh').style.color='#e94560';
    if(streamWs&&streamWs.readyState===WebSocket.OPEN)streamWs.send(JSON.stringify({action:'quality',value:v}));
}

// ============ Prevent Context Menu ============
document.addEventListener('contextmenu',e=>{if(document.getElementById('desktopTab').classList.contains('active'))e.preventDefault()});

// ============ Download ============
async function downloadAgent(){const r=await fetch('/api/agent/download',{headers:{'x-api-token':token}});if(!r.ok)return;const blob=await r.blob();const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='ExhibitionAgent.exe';a.click()}
</script>
</body>
</html>
