<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><title>Test</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#000;height:100vh;display:flex;align-items:center;justify-content:center}
#c{max-width:100%;max-height:100%}</style></head><body>
<canvas id="c"></canvas>
<script>
let oc=document.createElement('canvas'),octx=oc.getContext('2d');
let dc=document.getElementById('c'),dctx=dc.getContext('2d');
let ws=new WebSocket('ws://192.168.1.3:8080/api/v1/stream?device_id=WIN-20A5AJ2SI0E');
ws.binaryType='arraybuffer';
ws.onopen=()=>console.log('OPEN');
ws.onclose=(e)=>console.log('CLOSE code='+e.code);
ws.onerror=(e)=>console.log('ERROR');
ws.onmessage=(e)=>{
    let b=new Uint8Array(e.data);
    console.log('MSG type=0x'+b[0].toString(16)+' size='+b.length);
    if(b[0]===0x04||b[0]===0x03){
        let jpegLen=(b[9]<<24)|(b[10]<<16)|(b[11]<<8)|b[12];
        let w=(b[5]<<8)|b[6],h=(b[7]<<8)|b[8];
        let jpeg=b.slice(13,13+jpegLen);
        createImageBitmap(new Blob([jpeg])).then(bmp=>{
            oc.width=w;oc.height=h;dc.width=w;dc.height=h;
            octx.drawImage(bmp,0,0);dctx.drawImage(oc,0,0);
        });
    }
};
</script></body></html>
