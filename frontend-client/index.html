<!DOCTYPE html>
<html lang="zh-CN" class="h-full m-0">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>展厅远程控制系统</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <style>
        body { margin: 0; height: 100%; display: flex; flex-direction: column; overflow: hidden; }
        .canvas-placeholder.hidden { display: none; }
        
        /* 滚动条美化 */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.5); }
        ::-webkit-scrollbar-thumb { background: rgba(51, 65, 85, 0.8); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(71, 85, 105, 1); }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 font-sans">
<!-- Device Details Modal -->
<div id="deviceModal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 hidden flex items-center justify-center">
  <div class="bg-slate-900 border border-slate-700 rounded-xl shadow-2xl w-full max-w-md overflow-hidden flex flex-col scale-100 transition-transform">
    <div class="px-6 py-4 border-b border-slate-800 flex justify-between items-center bg-slate-900/50">
      <h3 class="text-lg font-bold text-slate-100 flex items-center gap-2">
        <span class="material-symbols-outlined text-emerald-500">developer_board</span>
        设备详情
      </h3>
      <button onclick="closeDeviceDetails()" class="text-slate-500 hover:text-slate-300">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
    <div class="p-6 flex flex-col gap-5">
      
      <div class="flex flex-col gap-1.5">
        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">系统设备 ID (不可更改)</label>
        <div class="bg-slate-950 border border-slate-800 px-3 py-2 rounded text-slate-400 font-mono text-sm">
          <span id="modalDeviceId"></span>
        </div>
      </div>

      <div class="flex flex-col gap-1.5">
        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">自定义显示名称</label>
        <input type="text" id="modalDeviceName" class="bg-slate-950 border border-slate-700 rounded px-3 py-2 text-sm focus:outline-none focus:border-emerald-500/50 text-slate-200 placeholder-slate-600" placeholder="例如：大厅主屏幕">
      </div>

      <div class="grid grid-cols-2 gap-4 pt-2">
         <div class="flex flex-col gap-1">
            <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">连接状态</span>
            <span id="modalDeviceStatus" class="text-sm font-medium">--</span>
         </div>
         <div class="flex flex-col gap-1">
            <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">数据加密</span>
            <span class="text-sm font-medium text-slate-300 flex items-center gap-1"><span class="material-symbols-outlined text-[16px] text-emerald-500">lock</span> 裸流直连</span>
         </div>
      </div>
      
    </div>
    <div class="px-6 py-4 border-t border-slate-800 bg-slate-900/50 flex justify-end gap-3">
      <button onclick="closeDeviceDetails()" class="px-4 py-2 rounded text-xs font-bold uppercase tracking-wider text-slate-400 hover:text-slate-200 transition-colors">取消</button>
      <button onclick="saveDeviceDetails()" class="px-4 py-2 bg-emerald-600 hover:bg-emerald-500 text-slate-950 rounded text-xs font-bold uppercase tracking-wider transition-colors shadow-[0_0_12px_rgba(16,185,129,0.3)]">保存更改</button>
    </div>
  </div>
</div>

<div class="flex flex-col h-screen w-full overflow-hidden">
  
  <!-- Header: System Status Bar -->
  <header class="h-14 bg-slate-900 border-b border-slate-800 flex items-center justify-between px-6 shrink-0">
    <div class="flex items-center gap-4">
      <div class="flex items-center gap-2">
        <div id="statusDot" class="w-3 h-3 bg-red-500 rounded-full"></div>
        <span class="font-bold tracking-tight text-slate-100">EXHIBITION REMOTE HUB <span class="text-slate-500 font-normal ml-2">v1.0.4-stable</span></span>
      </div>
      <div class="h-4 w-px bg-slate-700"></div>
      <div class="flex items-center gap-2">
         <input type="text" id="serverUrl" value="http://127.0.0.1:8080" class="bg-slate-950 border border-slate-700 rounded px-3 py-1.5 text-xs focus:outline-none focus:border-emerald-500/50 text-slate-300 w-56 font-mono" placeholder="服务端地址">
         <button onclick="loadDevices()" class="px-3 py-1.5 bg-slate-800 border border-slate-700 rounded hover:bg-slate-700 text-xs font-bold uppercase transition-all text-slate-300">刷新设备</button>
      </div>
    </div>
    <div class="flex items-center gap-6 text-xs">
      <div class="flex flex-col items-end">
        <span class="text-slate-500 uppercase font-bold tracking-wider text-[10px]">状态</span>
        <span id="badgeText" class="font-mono text-slate-300 font-bold">未连接</span>
      </div>
      <button id="disconnectBtn" onclick="disconnectDevice()" class="hidden px-4 py-2 bg-red-900/20 border border-red-500/30 text-red-400 rounded hover:bg-red-900/40 hover:text-red-300 font-bold uppercase transition-all tracking-wider text-[10px]">断开连接</button>
    </div>
  </header>

  <!-- Main Content Area -->
  <main class="flex flex-1 overflow-hidden">
    
    <!-- Sidebar: Device List -->
    <aside class="w-72 bg-slate-900/50 border-r border-slate-800 flex flex-col">
      <div class="p-4 border-b border-slate-800">
        <div class="text-[10px] text-slate-500 uppercase font-bold tracking-widest flex justify-between items-center">
           <span>在线设备</span>
           <span id="deviceCount" class="text-emerald-400 bg-emerald-500/10 px-2 py-0.5 rounded border border-emerald-500/20">0</span>
        </div>
      </div>
      <div id="deviceListContainer" class="flex-1 overflow-y-auto">
        <!-- Devices will be injected here -->
        <div class="p-8 text-xs text-slate-500 text-center flex flex-col items-center gap-2">
          <span class="material-symbols-outlined text-4xl opacity-30">router</span>
          <span>点击上方「刷新设备」加载在线列表</span>
        </div>
      </div>
      <div class="p-4 border-t border-slate-800 bg-slate-900 shrink-0">
        <div class="text-[10px] text-slate-500 mb-3 uppercase font-bold tracking-widest">终端网络统计</div>
        <div class="grid grid-cols-2 gap-3 text-xs">
           <div class="flex flex-col bg-slate-950 p-2 border border-slate-800 rounded">
              <span class="text-slate-500 text-[10px] uppercase font-bold mb-1">FPS</span>
              <span id="fpsValue" class="text-slate-200 font-mono text-sm">--</span>
           </div>
           <div class="flex flex-col bg-slate-950 p-2 border border-slate-800 rounded">
              <span class="text-slate-500 text-[10px] uppercase font-bold mb-1">速率 (KB/s)</span>
              <span id="dataRate" class="text-emerald-400 font-mono text-sm">--</span>
           </div>
           <div class="flex flex-col bg-slate-950 p-2 border border-slate-800 rounded">
              <span class="text-slate-500 text-[10px] uppercase font-bold mb-1">变化块</span>
              <span id="blockCount" class="text-amber-400 font-mono text-sm">--</span>
           </div>
           <div class="flex flex-col bg-slate-950 p-2 border border-slate-800 rounded">
              <span class="text-slate-500 text-[10px] uppercase font-bold mb-1">延迟 (ms)</span>
              <span id="latencyValue" class="text-blue-400 font-mono text-sm">--</span>
           </div>
        </div>
      </div>
    </aside>

    <!-- Main Control & Stream Area -->
    <section class="flex-1 flex flex-col bg-slate-950 relative">
      <!-- Top Info Bar -->
      <div class="h-12 bg-slate-900/80 backdrop-blur border-b border-slate-800 flex items-center justify-between px-6 shrink-0 z-10">
        <div class="flex items-center gap-6">
          <span class="text-xs font-mono text-slate-500 flex items-center gap-2">
            当前控制: <span id="toolbarDevice" class="text-emerald-400 bg-emerald-500/10 px-1.5 rounded">未连接</span>
          </span>
          <span class="text-xs font-mono text-slate-500 flex items-center gap-2">
            分辨率: <span id="toolbarRes" class="text-blue-400">--</span>
          </span>
        </div>
        <div class="flex gap-2 text-xs font-mono bg-slate-950 border border-slate-800 px-3 py-1 rounded">
           <span id="toolbarFPS" class="text-emerald-400 font-bold">0 FPS</span>
        </div>
      </div>

      <!-- Remote View Canvas Placeholder -->
      <div class="flex-1 relative flex items-center justify-center overflow-hidden bg-black p-4">
        
        <canvas id="remoteCanvas" class="w-full h-full object-contain cursor-crosshair relative z-10 shadow-2xl"></canvas>

        <div id="placeholder" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-950 text-slate-500 pointer-events-none transition-opacity z-20">
           <div class="w-32 h-32 mb-6 rounded-full bg-slate-900 flex items-center justify-center border border-slate-800 shadow-inner">
             <span class="material-symbols-outlined text-6xl opacity-40">cast</span>
           </div>
           <span class="text-xl font-medium text-slate-300 mb-2 tracking-wide">等待建立连接...</span>
           <span class="text-sm">请在左侧列表选择一台设备以接收画面流</span>
        </div>

        <!-- Stream Overlay Info -->
        <div class="absolute top-8 right-8 bg-slate-900/80 backdrop-blur border border-slate-800 p-3 rounded font-mono text-[10px] flex flex-col gap-1.5 pointer-events-none z-30 shadow-xl">
          <div class="flex justify-between gap-10"><span class="text-slate-500">PROTOCOL</span><span class="text-emerald-400">WS-BINARY</span></div>
          <div class="flex justify-between gap-10"><span class="text-slate-500">COMPRESSION</span><span class="text-amber-400">TurboJPEG</span></div>
          <div class="flex justify-between gap-10"><span class="text-slate-500">RENDERER</span><span class="text-blue-400">HTML5 Canvas</span></div>
        </div>
        
        <!-- Input Overlay -->
        <div class="absolute bottom-8 left-8 flex gap-3 pointer-events-none z-30">
           <div id="controlStatus" class="bg-slate-900/80 backdrop-blur border border-slate-800 px-3 py-1.5 rounded text-[10px] text-slate-400 font-bold uppercase tracking-widest shadow-xl flex items-center gap-1.5">
             <span class="w-1.5 h-1.5 rounded-full bg-slate-600"></span> 未连接
           </div>
           <div id="keyboardStatus" class="bg-slate-900/80 backdrop-blur border border-slate-800 px-3 py-1.5 rounded text-[10px] text-slate-400 font-bold uppercase tracking-widest shadow-xl flex items-center gap-1.5">
             键盘未捕获
           </div>
        </div>
      </div>
    </section>
  </main>
</div>
<script src="remote-client.js"></script>
<script>
    let client = null;
    let fpsCounter = 0;
    let fpsTimer = null;
    let bytesReceived = 0;
    let dataRateTimer = null;
    let blockCounter = 0;
    let blockTimer = null;
    let currentDeviceId = null;

    let deviceNames = JSON.parse(localStorage.getItem('exhibition_device_names') || '{}');
    let editingDeviceId = null;

    function getDeviceName(id) {
        return deviceNames[id] || id;
    }

    function openDeviceDetails(id) {
        editingDeviceId = id;
        document.getElementById('modalDeviceId').textContent = id;
        document.getElementById('modalDeviceName').value = deviceNames[id] || '';
        
        const isConnected = (id === currentDeviceId);
        const statusEl = document.getElementById('modalDeviceStatus');
        if (isConnected) {
            statusEl.innerHTML = '<span class="text-emerald-400 flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span> 正在控制</span>';
        } else {
            statusEl.innerHTML = '<span class="text-slate-400 flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full bg-slate-600"></span> 就绪</span>';
        }
        
        document.getElementById('deviceModal').classList.remove('hidden');
    }

    function closeDeviceDetails() {
        document.getElementById('deviceModal').classList.add('hidden');
        editingDeviceId = null;
    }

    function saveDeviceDetails() {
        if (!editingDeviceId) return;
        const newName = document.getElementById('modalDeviceName').value.trim();
        if (newName) {
            deviceNames[editingDeviceId] = newName;
        } else {
            delete deviceNames[editingDeviceId];
        }
        localStorage.setItem('exhibition_device_names', JSON.stringify(deviceNames));
        
        renderDeviceList(window.lastDevices || []);
        if (currentDeviceId === editingDeviceId) {
            document.getElementById('toolbarDevice').textContent = getDeviceName(currentDeviceId);
        }
        closeDeviceDetails();
    }

    function updateBadge(state, text) {
        const dot = document.getElementById('statusDot');
        document.getElementById('badgeText').textContent = text;
        
        dot.className = 'w-3 h-3 rounded-full ' + 
            (state === 'connected' ? 'bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.6)]' : 
             state === 'loading' ? 'bg-amber-500 shadow-[0_0_8px_rgba(245,158,11,0.6)]' : 'bg-red-500');
    }

    function setConnected(deviceId) {
        updateBadge('connected', '已连接');
        document.getElementById('disconnectBtn').classList.remove('hidden');
        document.getElementById('placeholder').classList.add('hidden');
        document.getElementById('toolbarDevice').textContent = getDeviceName(deviceId);
        document.getElementById('controlStatus').innerHTML = '<span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span> <span class="text-emerald-400">流传输中</span>';
        renderDeviceList(window.lastDevices || []);
    }

    function setDisconnected() {
        updateBadge('disconnected', '未连接');
        document.getElementById('disconnectBtn').classList.add('hidden');
        document.getElementById('placeholder').classList.remove('hidden');
        document.getElementById('toolbarDevice').textContent = '未连接';
        document.getElementById('toolbarRes').textContent = '--';
        document.getElementById('controlStatus').innerHTML = '<span class="w-1.5 h-1.5 rounded-full bg-slate-600"></span> 未连接';
        document.getElementById('keyboardStatus').innerHTML = '键盘未捕获';
        document.getElementById('fpsValue').textContent = '--';
        document.getElementById('latencyValue').textContent = '--';
        document.getElementById('blockCount').textContent = '--';
        document.getElementById('dataRate').textContent = '--';
        document.getElementById('toolbarFPS').textContent = '0 FPS';
        currentDeviceId = null;
        renderDeviceList(window.lastDevices || []);
    }

    function renderDeviceList(devices) {
        window.lastDevices = devices;
        const container = document.getElementById('deviceListContainer');
        document.getElementById('deviceCount').textContent = devices.length;
        
        if (devices.length === 0) {
            container.innerHTML = '<div class="p-8 text-xs text-slate-500 text-center flex flex-col items-center gap-2"><span class="material-symbols-outlined text-4xl opacity-30">wifi_off</span><span>暂无设备在线</span></div>';
            return;
        }

        container.innerHTML = devices.map(id => {
            const isActive = id === currentDeviceId;
            const bgClass = isActive ? 'bg-emerald-500/10 border-l-4 border-emerald-500' : 'border-b border-slate-800 hover:bg-slate-800/50 border-l-4 border-transparent';
            const statusBadge = isActive 
                ? '<span class="text-[10px] bg-emerald-500 text-slate-950 px-1.5 py-0.5 rounded font-bold tracking-wider shadow-[0_0_8px_rgba(16,185,129,0.4)]">ACTIVE</span>'
                : '<span class="text-[10px] border border-slate-600 text-slate-500 px-1.5 py-0.5 rounded font-bold tracking-wider">IDLE</span>';
            const displayName = getDeviceName(id);
                
            return `
            <div class="p-4 transition-all ${bgClass} group relative">
              <div class="flex justify-between items-start mb-1">
                <div class="flex flex-col cursor-pointer flex-1 overflow-hidden" onclick="connectDevice('${id}')">
                    <span class="font-bold text-sm truncate pr-2 ${isActive ? 'text-slate-100' : 'text-slate-400'}">${displayName}</span>
                    <span class="text-[10px] text-slate-600 font-mono mt-0.5 truncate">${id}</span>
                </div>
                <div class="flex items-center gap-2 shrink-0">
                    <button onclick="openDeviceDetails('${id}')" class="text-slate-500 hover:text-slate-300 transition-colors p-1 opacity-0 group-hover:opacity-100" title="设备详情 / 重命名">
                        <span class="material-symbols-outlined text-[16px]">settings</span>
                    </button>
                    ${statusBadge}
                </div>
              </div>
              <div class="text-[10px] text-slate-500 font-mono mt-2 flex items-center gap-1 uppercase font-bold tracking-widest cursor-pointer w-fit hover:text-slate-400 transition-colors" onclick="connectDevice('${id}')">
                <span class="material-symbols-outlined text-[12px]">mouse</span> Click to control
              </div>
            </div>`;
        }).join('');
    }

    async function loadDevices() {
        const serverUrl = document.getElementById('serverUrl').value;
        updateBadge('loading', '加载中...');
        try {
            const res = await fetch(`${serverUrl}/api/v1/devices`);
            const devices = await res.json();
            renderDeviceList(devices);
            updateBadge(currentDeviceId ? 'connected' : 'disconnected', currentDeviceId ? '已连接' : '就绪');
        } catch (e) {
            console.error(e);
            updateBadge('disconnected', '后端不可达');
            document.getElementById('deviceListContainer').innerHTML = '<div class="p-8 text-xs text-red-400/80 text-center flex flex-col items-center gap-2"><span class="material-symbols-outlined text-4xl opacity-50">error</span><span>后端连接失败</span></div>';
        }
    }

    function connectDevice(deviceId) {
        const serverUrl = document.getElementById('serverUrl').value;
        if (!deviceId) return;

        if (client) {
            if (client.ws) client.ws.close();
            client.releaseKeyboard();
        }

        currentDeviceId = deviceId;
        const canvas = document.getElementById('remoteCanvas');
        client = new ExhibitionRemoteClient(canvas, serverUrl, deviceId, (stats) => {
            if (stats.type === 'frame') {
                fpsCounter++;
                bytesReceived += stats.byteLength || 0;
                if (stats.frameType === 0x01) blockCounter++;
            } else if (stats.type === 'keyboard') {
                const el = document.getElementById('keyboardStatus');
                if (stats.captured) {
                    el.innerHTML = '<span class="text-emerald-400">键盘已捕获</span>';
                } else {
                    el.innerHTML = '键盘未捕获';
                }
            }
        });

        fpsCounter = 0;
        bytesReceived = 0;
        blockCounter = 0;
        if (fpsTimer) clearInterval(fpsTimer);
        if (dataRateTimer) clearInterval(dataRateTimer);
        if (blockTimer) clearInterval(blockTimer);

        fpsTimer = setInterval(() => {
            document.getElementById('fpsValue').textContent = fpsCounter;
            document.getElementById('toolbarFPS').textContent = fpsCounter + ' FPS';
            fpsCounter = 0;
        }, 1000);

        dataRateTimer = setInterval(() => {
            const kb = Math.round(bytesReceived / 1024);
            document.getElementById('dataRate').textContent = kb;
            bytesReceived = 0;
        }, 1000);

        blockTimer = setInterval(() => {
            document.getElementById('blockCount').textContent = blockCounter;
            blockCounter = 0;
        }, 1000);

        // Update resolution on frame
        setInterval(() => {
            if (client && client.maxFullW > 0) {
                document.getElementById('toolbarRes').textContent = client.maxFullW + 'x' + client.maxFullH;
            }
        }, 2000);

        setConnected(deviceId);
    }

    function disconnectDevice() {
        if (client) {
            client.releaseKeyboard();
            if (client.ws) client.ws.close();
        }
        client = null;
        if (fpsTimer) clearInterval(fpsTimer);
        if (dataRateTimer) clearInterval(dataRateTimer);
        if (blockTimer) clearInterval(blockTimer);
        setDisconnected();

        // Clear canvas
        const canvas = document.getElementById('remoteCanvas');
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    // Init
    loadDevices();
</script>
</body>
</html>
